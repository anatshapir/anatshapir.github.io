const AutomatonSVG = ({ states, transitions, accepting, initial, width = 500, height = 200 }) => {
  return (
    <svg viewBox={`0 0 ${width} ${height}`} style={{width: '100%', maxWidth: '500px', margin: '0 auto', display: 'block', background: 'white', borderRadius: '8px', border: '1px solid #e5e7eb'}}>
      <defs>
        <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
          <polygon points="0 0, 10 3.5, 0 7" fill="#4B5563" />
        </marker>
        <marker id="arrowhead-initial" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
          <polygon points="0 0, 10 3.5, 0 7" fill="#059669" />
        </marker>
      </defs>
      
      {initial && states[initial] && (
        <g>
          <line x1={states[initial].x - 55} y1={states[initial].y} x2={states[initial].x - 25} y2={states[initial].y}
            stroke="#059669" strokeWidth="2.5" markerEnd="url(#arrowhead-initial)" />
          <text x={states[initial].x - 55} y={states[initial].y - 8} fontSize="11" fill="#059669" fontWeight="bold">התחלה</text>
        </g>
      )}
      
      {transitions.map((t, i) => {
        const from = states[t.from];
        const to = states[t.to];
        if (!from || !to) return null;
        
        if (t.from === t.to) {
          const loopY = from.y - 45;
          return (
            <g key={i}>
              <path d={`M ${from.x - 15} ${from.y - 20} C ${from.x - 30} ${loopY - 20}, ${from.x + 30} ${loopY - 20}, ${from.x + 15} ${from.y - 20}`}
                fill="none" stroke="#4B5563" strokeWidth="2" markerEnd="url(#arrowhead)" />
              <rect x={from.x - 15} y={loopY - 30} width="30" height="18" fill="white" rx="3" />
              <text x={from.x} y={loopY - 16} textAnchor="middle" fontSize="15" fill="#DC2626" fontWeight="bold">{t.label}</text>
            </g>
          );
        } else {
          const dx = to.x - from.x;
          const dy = to.y - from.y;
          const len = Math.sqrt(dx * dx + dy * dy);
          const offsetX = (dx / len) * 22;
          const offsetY = (dy / len) * 22;
          const hasReverse = transitions.some(tr => tr.from === t.to && tr.to === t.from);
          const isForward = from.x < to.x || (from.x === to.x && from.y < to.y);
          const curve = hasReverse ? (isForward ? -25 : 25) : 0;
          const midX = (from.x + to.x) / 2;
          const midY = (from.y + to.y) / 2 + curve;
          const ctrlY = midY + (isForward ? -25 : 25);
          
          return (
            <g key={i}>
              {hasReverse ? (
                <path d={`M ${from.x + offsetX} ${from.y + offsetY} Q ${midX} ${ctrlY} ${to.x - offsetX} ${to.y - offsetY}`}
                  fill="none" stroke="#4B5563" strokeWidth="2" markerEnd="url(#arrowhead)" />
              ) : (
                <line x1={from.x + offsetX} y1={from.y + offsetY} x2={to.x - offsetX} y2={to.y - offsetY}
                  stroke="#4B5563" strokeWidth="2" markerEnd="url(#arrowhead)" />
              )}
              <rect x={midX - 15} y={midY + (hasReverse ? (isForward ? -34 : 6) : -16)} width="30" height="20" fill="white" rx="3" />
              <text x={midX} y={midY + (hasReverse ? (isForward ? -18 : 22) : 0)} textAnchor="middle" fontSize="15" fill="#DC2626" fontWeight="bold">{t.label}</text>
            </g>
          );
        }
      })}
      
      {Object.entries(states).map(([name, pos]) => {
        const isAccepting = accepting.includes(name);
        return (
          <g key={name}>
            <circle cx={pos.x} cy={pos.y} r="20" fill={isAccepting ? "#D1FAE5" : "white"} stroke={isAccepting ? "#059669" : "#4B5563"} strokeWidth="2" />
            {isAccepting && <circle cx={pos.x} cy={pos.y} r="15" fill="none" stroke="#059669" strokeWidth="2" />}
            <text x={pos.x} y={pos.y + 5} textAnchor="middle" fontSize="14" fill="#1F2937" fontWeight="bold">{name}</text>
          </g>
        );
      })}
    </svg>
  );
};

function App() {
  const [currentExercise, setCurrentExercise] = useState(0);
  const [selectedAnswer, setSelectedAnswer] = useState(null);
  const [showResult, setShowResult] = useState(false);
  const [showHint, setShowHint] = useState(false);
  const [score, setScore] = useState(0);
  const [answeredQuestions, setAnsweredQuestions] = useState([]);
  const [filterLevel, setFilterLevel] = useState(0);

  const filteredExercises = exercises.filter(e => filterLevel === 0 || e.level === filterLevel);
  const exercise = filteredExercises[currentExercise] || exercises[0];

  const handleSubmit = () => {
    if (selectedAnswer === null) return;
    setShowResult(true);
    if (selectedAnswer === exercise.correctAnswer && !answeredQuestions.includes(exercise.id)) {
      setScore(score + 1);
      setAnsweredQuestions([...answeredQuestions, exercise.id]);
    }
  };

  const nextExercise = () => {
    setCurrentExercise((currentExercise + 1) % filteredExercises.length);
    setSelectedAnswer(null);
    setShowResult(false);
    setShowHint(false);
  };

  const getLevelClass = (level) => 'level-' + level;

  return (
    <div className="container">
      <div className="card">
        <h1>🎯 תרגול מודלים חישוביים</h1>
        <p className="subtitle">אוטומטים, שפות רגולריות ותכונות סגירות</p>
        <div className="stats">
          <span className="stat stat-green">ניקוד: {score}/{answeredQuestions.length}</span>
          <span className="stat stat-blue">שאלה {currentExercise + 1} מתוך {filteredExercises.length}</span>
        </div>
        <div className="filters">
          <select value={filterLevel} onChange={(e) => {setFilterLevel(Number(e.target.value)); setCurrentExercise(0);}}>
            <option value={0}>כל הרמות</option>
            <option value={1}>רמה 1</option>
            <option value={2}>רמה 2</option>
            <option value={3}>רמה 3</option>
            <option value={4}>רמה 4</option>
          </select>
        </div>
      </div>

      <div className="card">
        <div className="question-header">
          <span className={`badge ${getLevelClass(exercise.level)}`}>רמה {exercise.level}</span>
          <span className="badge badge-topic">{exercise.topic}</span>
        </div>
        <h2 className="question-text">{exercise.question}</h2>
        
        {exercise.automaton && automata[exercise.automaton] && (
          <div className="automaton-container">
            <AutomatonSVG {...automata[exercise.automaton]} />
          </div>
        )}

        <div className="options">
          {exercise.options.map((option, index) => (
            <button key={index} onClick={() => !showResult && setSelectedAnswer(index)} disabled={showResult}
              className={`option-btn ${showResult ? (index === exercise.correctAnswer ? 'correct' : index === selectedAnswer ? 'wrong' : '') : selectedAnswer === index ? 'selected' : ''}`}>
              <span style={{fontWeight: 'bold', marginLeft: '8px'}}>{String.fromCharCode(1488 + index)}.</span>{option}
            </button>
          ))}
        </div>

        {showHint && !showResult && (
          <div className="hint-box">
            <span className="hint-label">💡 רמז: </span><span className="hint-text">{exercise.hint}</span>
          </div>
        )}

        {showResult && (
          <div className={`result-box ${selectedAnswer === exercise.correctAnswer ? 'result-correct' : 'result-wrong'}`}>
            <p className={`result-title ${selectedAnswer === exercise.correctAnswer ? 'correct' : 'wrong'}`}>
              {selectedAnswer === exercise.correctAnswer ? '✓ תשובה נכונה!' : '✗ תשובה שגויה'}
            </p>
            <p className="explanation"><strong>הסבר:</strong> {exercise.explanation}</p>
          </div>
        )}

        <div className="buttons">
          {!showResult && (
            <>
              <button onClick={() => setShowHint(!showHint)} className="btn btn-yellow">{showHint ? 'הסתר רמז' : '💡 רמז'}</button>
              <button onClick={handleSubmit} className="btn btn-indigo">בדוק תשובה</button>
            </>
          )}
          {showResult && <button onClick={nextExercise} className="btn btn-green">שאלה הבאה →</button>}
        </div>
      </div>

      <div className="card">
        <h3 className="reference-title">📋 תכונות סגירות:</h3>
        <div className="reference-grid">
          {['איחוד ∪', 'חיתוך ∩', 'משלים ¬', 'שרשור ·', 'כוכב *', 'היפוך ᴿ', 'הפרש \\', 'XOR ⊕'].map(op => (
            <div key={op} className="ref-item">
              <div className="ref-op">{op}</div>
              <div className="ref-status">✓ סגור</div>
            </div>
          ))}
        </div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
</body>
</html>
